name: Release

on:
  push:
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Read package metadata
        id: package
        run: |
          NAME="$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); process.stdout.write(pkg.name)")"
          VERSION="$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); process.stdout.write(pkg.version)")"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check release availability
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXPECTED_TAG="${{ steps.package.outputs.tag }}"

          if gh release view "$EXPECTED_TAG" >/dev/null 2>&1; then
            echo "Release $EXPECTED_TAG already exists. Bump package.json version before releasing again."
            exit 1
          fi

          TAG_COMMIT="$(git rev-list -n 1 "$EXPECTED_TAG" 2>/dev/null || true)"
          HEAD_COMMIT="$(git rev-parse HEAD)"
          if [ -n "$TAG_COMMIT" ] && [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
            echo "Tag $EXPECTED_TAG already points to $TAG_COMMIT, but current package.json is on $HEAD_COMMIT"
            exit 1
          fi

          if [ -n "$TAG_COMMIT" ]; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test, build, and package
        run: bun run release

      - name: Generate release notes
        run: bun run release:notes

      - name: Create release tag
        if: steps.release.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.package.outputs.tag }}" -m "Release ${{ steps.package.outputs.tag }}"
          git push origin "${{ steps.package.outputs.tag }}"

      - name: Generate checksums
        run: |
          cd release
          sha256sum edgegist-upload.zip edgegist-package.zip > SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.package.outputs.tag }}" \
            release/edgegist-upload.zip \
            release/edgegist-package.zip \
            release/SHA256SUMS \
            --verify-tag \
            --title "${{ steps.package.outputs.name }} ${{ steps.package.outputs.tag }}" \
            --notes-file release/RELEASE_NOTES.md
